<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
canvas { border: 3px solid #16213e; border-radius: 4px; }
#ui {
  position: absolute;
  top: 20px; left: 50%; transform: translateX(-50%);
  color: #e94560; font-size: 18px;
  display: flex; gap: 40px; pointer-events: none;
}
#ui span { background: #0f3460; padding: 6px 16px; border-radius: 4px; }
#gameover {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #e94560; font-size: 36px; text-align: center; display: none; pointer-events: none;
}
#gameover button {
  display: block; margin: 16px auto 0;
  padding: 10px 30px; font-size: 20px;
  background: #e94560; color: #fff; border: none;
  border-radius: 6px; cursor: pointer; pointer-events: all;
}
#gameover button:hover { background: #c23152; }
#info {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: #555; font-size: 13px; pointer-events: none;
}
</style>
</head>
<body>

<div id="ui">
  <span>Score: <b id="score">0</b></span>
  <span>Lives: <b id="lives">3</b></span>
  <span>Level: <b id="level">1</b></span>
</div>
<div id="gameover">
  <div id="goText">GAME OVER</div>
  <button id="restartBtn" onclick="restartGame()">Play Again</button>
</div>
<div id="info">Arrow Keys = Move &nbsp;|&nbsp; Space = Shoot &nbsp;|&nbsp; P = Pause</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const TILE = 40;
const COLS = 19;
const ROWS = 14;
const W = COLS * TILE;
const H = ROWS * TILE;
canvas.width = W;
canvas.height = H;

const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

let score = 0, lives = 3, level = 1;
let player, enemies = [], bullets = [], particles = [];
let keys = {};
let paused = false, gameOver = false;
let spawnTimer = 0;
let baseEnemyCount = 3;
let map = [];

function buildMap() {
  map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      map[r][c] = 0;
    }
  }

  // borders
  for (let r = 0; r < ROWS; r++) {
    map[r][0] = 1;
    map[r][COLS - 1] = 1;
  }
  for (let c = 0; c < COLS; c++) {
    map[0][c] = 1;
    map[ROWS - 1][c] = 1;
  }

  // brick walls
  const bricks = [
    [2,0],[2,1],[2,2], [12,1],[12,2],[12,3], [7,0],[7,1],
    [2,5],[2,6],[2,7], [12,5],[12,6],[12,7], [7,5],[7,6],
    [4,2],[5,2],[6,2], [4,4],[5,4],[6,4],
    [8,3],[9,3],[10,3], [8,5],[9,5],[10,5],
    [1,3],[1,4],[3,3],[3,4], [15,3],[15,4],[17,3],[17,4],
    [7,3],[7,4],[9,3],[9,4],[11,3],[11,4],
    [5,1],[5,2],[13,1],[13,2],
  ];
  bricks.forEach(([c, r]) => {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) map[r][c] = 1;
  });

  // steel (indestructible)
  const steel = [[5,1],[5,5],[13,1],[13,5],[9,1],[9,5]];
  steel.forEach(([c, r]) => {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) map[r][c] = 2;
  });

  // clear player spawn (bottom-middle)
  for (let r = 12; r < 14; r++)
    for (let c = 8; c <= 10; c++)
      map[r][c] = 0;

  // clear enemy spawn (top-middle)
  for (let r = 0; r < 2; r++)
    for (let c = 8; c <= 10; c++)
      map[r][c] = 0;
}

function tileAt(px, py) {
  const c = Math.floor(px / TILE);
  const r = Math.floor(py / TILE);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 1;
  return map[r][c];
}

// --- Tank ---
class Tank {
  constructor(x, y, dir, color, isPlayer) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2.5 : 1.2;
    this.size = 14;
    this.reload = 0;
    this.reloadTime = isPlayer ? 18 : 80;
    this.alive = true;
    this.wanderTimer = 0;
    this.shootCooldown = 0;
  }

  update() {
    if (!this.alive) return;
    this.reload = Math.max(0, this.reload - 1);
    if (!this.isPlayer) this.aiMove();
  }

  aiMove() {
    this.shootCooldown = Math.max(0, this.shootCooldown - 1);

    // shoot at player if aligned
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    if (this.shootCooldown <= 0) {
      const adx = Math.abs(dx), ady = Math.abs(dy);
      if (adx < TILE * 1.5 && ady < TILE * 1.5) {
        if ((adx < ady && ((dy > 0 && this.dir === DIR.DOWN) || (dy < 0 && this.dir === DIR.UP))) ||
            (ady <= adx && ((dx > 0 && this.dir === DIR.RIGHT) || (dx < 0 && this.dir === DIR.LEFT)))) {
          this.shoot();
          this.shootCooldown = 40;
        }
      }
    }

    this.wanderTimer--;
    if (this.wanderTimer <= 0) {
      this.wanderTimer = 30 + Math.floor(Math.random() * 50);
      if (Math.random() < 0.4) {
        const adx = Math.abs(player.x - this.x), ady = Math.abs(player.y - this.y);
        this.wanderDir = adx > ady ? (player.x > this.x ? DIR.RIGHT : DIR.LEFT)
                                    : (player.y > this.y ? DIR.DOWN : DIR.UP);
      } else {
        this.wanderDir = Math.floor(Math.random() * 4);
      }
    }

    this.dir = this.wanderDir;
    const nx = this.x + DX[this.dir] * this.speed;
    const ny = this.y + DY[this.dir] * this.speed;
    if (!this.wouldCollide(nx, ny)) {
      this.x = nx; this.y = ny;
    } else {
      this.wanderTimer = 0;
    }

    if (this.reload <= 0 && Math.random() < 0.012) this.shoot();
  }

  wouldCollide(nx, ny) {
    const s = this.size;
    const corners = [[nx-s,ny-s],[nx+s,ny-s],[nx-s,ny+s],[nx+s,ny+s]];
    for (const [cx, cy] of corners) {
      if (tileAt(cx, cy) > 0) return true;
    }
    const all = this.isPlayer ? enemies : [player, ...enemies];
    for (const t of all) {
      if (t === this || !t.alive) continue;
      if (Math.abs(nx - t.x) < this.size + t.size && Math.abs(ny - t.y) < this.size + t.size) return true;
    }
    return false;
  }

  shoot() {
    if (this.reload > 0) return;
    this.reload = this.reloadTime;
    const bx = this.x + DX[this.dir] * (this.size + 6);
    const by = this.y + DY[this.dir] * (this.size + 6);
    bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
  }

  draw() {
    if (!this.alive) return;
    ctx.save();
    ctx.translate(this.x, this.y);

    const s = this.size;
    const a = this.dir;

    // tracks
    ctx.fillStyle = '#2a2a2a';
    if (a === DIR.UP || a === DIR.DOWN) {
      ctx.fillRect(-s-3, -s, 5, s*2);
      ctx.fillRect(s-2, -s, 5, s*2);
    } else {
      ctx.fillRect(-s, -s-3, s*2, 5);
      ctx.fillRect(-s, s-2, s*2, 5);
    }

    // body
    ctx.fillStyle = this.color;
    ctx.fillRect(-s+2, -s+2, s*2-4, s*2-4);

    // barrel
    ctx.fillStyle = this.isPlayer ? '#0f0' : '#faa';
    if (a === DIR.UP) ctx.fillRect(-3, -s-7, 6, s+5);
    else if (a === DIR.DOWN) ctx.fillRect(-3, 2, 6, s+5);
    else if (a === DIR.LEFT) ctx.fillRect(-s-7, -3, s+5, 6);
    else ctx.fillRect(2, -3, s+5, 6);

    // dome
    ctx.fillStyle = this.isPlayer ? '#5f5' : '#c44';
    ctx.beginPath();
    ctx.arc(0, 0, s-4, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
}

// --- Bullet ---
class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.fromPlayer = fromPlayer;
    this.speed = 5;
    this.alive = true;
    this.size = 3;
  }

  update() {
    this.x += DX[this.dir] * this.speed;
    this.y += DY[this.dir] * this.speed;

    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.alive = false; return;
    }

    const t = tileAt(this.x, this.y);
    if (t > 0) {
      this.alive = false;
      if (t === 1) {
        const c = Math.floor(this.x / TILE), r = Math.floor(this.y / TILE);
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          map[r][c] = 0;
          spawnParticles(c*TILE+TILE/2, r*TILE+TILE/2, '#aaa');
        }
      }
      return;
    }

    if (this.fromPlayer) {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (Math.abs(this.x-e.x) < e.size && Math.abs(this.y-e.y) < e.size) {
          this.alive = false; e.alive = false;
          score += 100;
          spawnParticles(e.x, e.y, e.color);
          updateUI(); return;
        }
      }
    } else {
      if (player.alive && Math.abs(this.x-player.x) < player.size && Math.abs(this.y-player.y) < player.size) {
        this.alive = false;
        playerHit(); return;
      }
    }

    // bullet vs bullet
    for (const b of bullets) {
      if (b === this || !b.alive || b.fromPlayer === this.fromPlayer) continue;
      if (Math.abs(this.x-b.x) < 5 && Math.abs(this.y-b.y) < 5) {
        this.alive = false; b.alive = false; return;
      }
    }
  }

  draw() {
    if (!this.alive) return;
    ctx.fillStyle = this.fromPlayer ? '#ff0' : '#f66';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

// --- particles ---
function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2.5;
    particles.push({
      x, y, color, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 25
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    return p.life > 0;
  });
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / 25;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
  }
  ctx.globalAlpha = 1;
}

// --- player ---
function playerHit() {
  if (!player.alive) return;
  player.alive = false;
  spawnParticles(player.x, player.y, '#0f0');
  lives--;
  updateUI();
  if (lives <= 0) endGame();
  else setTimeout(respawnPlayer, 1200);
}

function respawnPlayer() {
  player.x = 9 * TILE + TILE/2;
  player.y = 13 * TILE + TILE/2;
  player.dir = DIR.UP;
  player.alive = true;
}

function endGame() {
  gameOver = true;
  document.getElementById('goText').textContent = 'GAME OVER';
  document.getElementById('gameover').style.display = 'block';
}

function restartGame() {
  score = 0; lives = 3; level = 1; baseEnemyCount = 3;
  gameOver = false;
  bullets = []; particles = []; enemies = [];
  buildMap();
  player.x = 9 * TILE + TILE/2;
  player.y = 13 * TILE + TILE/2;
  player.dir = DIR.UP;
  player.alive = true;
  spawnTimer = 0;
  updateUI();
  document.getElementById('gameover').style.display = 'none';
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

// --- spawn ---
function spawnEnemy() {
  const sx = 9 * TILE + TILE/2;
  const sy = TILE/2;
  for (const e of enemies) {
    if (e.alive && Math.abs(sx-e.x) < TILE*2 && Math.abs(sy-e.y) < TILE*2) return;
  }
  const colors = ['#e74c3c','#e67e22','#9b59b6','#1abc9c','#f39c12'];
  enemies.push(new Tank(sx, sy, DIR.DOWN, colors[Math.floor(Math.random()*colors.length)], false));
}

// --- drawing ---
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = map[r][c];
      if (v === 0) continue;
      const x = c * TILE, y = r * TILE;
      if (v === 1) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#A0522D';
        ctx.fillRect(x+2, y+2, TILE/2-2, TILE/2-2);
        ctx.fillRect(x+TILE/2, y+TILE/2, TILE/2-2, TILE/2-2);
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
      } else if (v === 2) {
        ctx.fillStyle = '#666';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#999';
        ctx.fillRect(x+3, y+3, TILE-6, TILE-6);
        ctx.fillStyle = '#444';
        ctx.fillRect(x+8, y+2, 4, TILE-4);
        ctx.fillRect(x+TILE-12, y+2, 4, TILE-4);
      }
    }
  }
}

// --- level ---
function checkLevelUp() {
  const alive = enemies.filter(e => e.alive).length;
  const total = enemies.filter(e => e.alive || !e.alive).length;
  if (alive === 0 && total >= baseEnemyCount) {
    level++;
    baseEnemyCount++;
    enemies = [];
    updateUI();
    document.getElementById('goText').textContent = 'LEVEL ' + level + '!';
    document.getElementById('gameover').style.display = 'block';
    setTimeout(() => {
      if (!gameOver) document.getElementById('gameover').style.display = 'none';
    }, 1500);
  }
}

// --- main ---
function update() {
  if (paused || gameOver) return;

  if (player.alive) {
    let nd = null;
    if (keys['ArrowUp'] || keys['w']) nd = DIR.UP;
    else if (keys['ArrowDown'] || keys['s']) nd = DIR.DOWN;
    else if (keys['ArrowLeft'] || keys['a']) nd = DIR.LEFT;
    else if (keys['ArrowRight'] || keys['d']) nd = DIR.RIGHT;

    if (nd !== null) {
      player.dir = nd;
      const nx = player.x + DX[nd] * player.speed;
      const ny = player.y + DY[nd] * player.speed;
      if (!player.wouldCollide(nx, ny)) { player.x = nx; player.y = ny; }
    }
    if (keys[' '] || keys['Space']) player.shoot();
    player.reload = Math.max(0, player.reload - 1);
  }

  spawnTimer++;
  const maxEnemies = baseEnemyCount;
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (spawnTimer > 100 && aliveEnemies < maxEnemies) {
    spawnTimer = 0;
    spawnEnemy();
  }

  for (const e of enemies) e.update();
  for (const b of bullets) b.update();
  bullets = bullets.filter(b => b.alive);
  updateParticles();
  checkLevelUp();
}

function draw() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  drawMap();

  for (const b of bullets) b.draw();
  for (const e of enemies) e.draw();
  if (player.alive) player.draw();
  drawParticles();

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- input ---
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') paused = !paused;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// --- start ---
buildMap();
player = new Tank(9 * TILE + TILE/2, 13 * TILE + TILE/2, DIR.UP, '#4CAF50', true);
for (let i = 0; i < baseEnemyCount; i++) {
  setTimeout(() => spawnEnemy(), i * 600);
}
updateUI();
gameLoop();
</script>
</body>
</html>
